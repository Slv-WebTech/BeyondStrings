name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
      VITE_OLLAMA_BASE_URL: ${{ secrets.VITE_OLLAMA_BASE_URL }}
      VITE_OLLAMA_MODEL: ${{ secrets.VITE_OLLAMA_MODEL }}
      VITE_REDUX_PERSIST_SECRET: ${{ secrets.VITE_REDUX_PERSIST_SECRET }}
      VITE_MESSAGE_TONE_URL: ${{ secrets.VITE_MESSAGE_TONE_URL }}
      VITE_BASE_PATH: /whatsapp-chats/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Validate Required Firebase Secrets
        run: |
          missing=0
          for key in \
            VITE_FIREBASE_API_KEY \
            VITE_FIREBASE_AUTH_DOMAIN \
            VITE_FIREBASE_PROJECT_ID \
            VITE_FIREBASE_APP_ID; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing secret::${key} is not configured in repository secrets."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Required Firebase build secrets are missing."
            exit 1
          fi

      - name: Build Site
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy To Pages
        id: deployment
        uses: actions/deploy-pages@v4
